<h1>
  To-Do list
</h1>
<input  [(ngModel)]="task" type="text" placeholder="enter your task">
<button (click)="addTask()" >
     Add Task
</button>
@for(task of taskList;track task.id){
    <ul>
      <li>
        {{task.id}}
      </li>
      <li>
        {{task.task}}
      </li>
      <li>
        <button (click)="delete(task.id)" >Delete</button>
      </li>
    </ul>
}
