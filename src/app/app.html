<h1>Counter App</h1>
<div style="text-align: center;">
  <h2 class="count">{{count}}</h2>
  <div class="container">
    <button (click)="handlecount('minus')" class="btn-red">Decrement</button>
    <button (click)="handlecount('reset')" class="btn-gray">Reset</button>
    <button (click)="handlecount('plus')" class="btn-green">Increment</button>
  </div>
</div>

<h1>Get and Set Input Field value</h1>
<h1>user name is : {{displayName}}</h1>
<input type="text" value="{{val}}" (input)="getName($event)"  placeholder="Enter user name">
<br>
<br>
<button (click)="showName()">
  Get value
</button>

<button (click)="setName()">Set Name</button>
